name: Build release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore .\GBFRSigilEditor.csproj

      - name: Publish
        run: dotnet publish .\GBFRSigilEditor.csproj -c Release -r win-x64 --self-contained true -o ".\publish\GBFR sigil generator"

      - name: Zip package
        shell: pwsh
        run: |
          Compress-Archive -Path ".\publish\GBFR sigil generator\*" -DestinationPath ".\GBFR-sigil-generator-${{ github.ref_name }}-win-x64.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .\GBFR-sigil-generator-${{ github.ref_name }}-win-x64.zip
